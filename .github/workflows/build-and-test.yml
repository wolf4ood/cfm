name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
      
      - name: "Set up Go"
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: "Generate Mocks"
        run: make generate-mocks

      - name: "Run tests"
        run: make test TEST_FORMAT=github-actions
        env:
          OTEL_SDK_DISABLED: "true"
